<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var repoBase = "/Placement-dept-demo";
        var path = window.location.pathname;
        var normalizedPath = path.indexOf(repoBase) === 0 ? path.slice(repoBase.length) : path;
        var target = window.location.origin + repoBase + "/#" + normalizedPath + window.location.search + window.location.hash;
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
 </html>
